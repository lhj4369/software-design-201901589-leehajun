services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    build:
      context: ./Server
      dockerfile: Dockerfile
      network: host
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/school
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-in-production}
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy

  client:
    build:
      context: ./Client
      dockerfile: Dockerfile
      # 레지스트리 연결이 끊길 때(Linux 네이티브 Docker): 아래 주석 해제 후 재빌드
      network: host
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server


  mongo-express:
    image: mongo-express:1.0.2
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD:-admin1234}
    ports:
      - "8081:8081"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
